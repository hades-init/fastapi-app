[Unit]
Description=FastAPI App (Docker Compose)
Requires=docker.service
After=docker.service network-online.target

[Service]
Type=oneshot
RemainAfterExit=yes
User=<your-user>
Group=docker
WorkingDirectory=/home/<your-user>/fastapi-app    # path to your fastapi code directory
ExecStart=/usr/bin/docker compose up -d
ExecStop=/usr/bin/docker compose down
TimeoutStartSec=10

[Install]
WantedBy=multi-user.target